name: PR Manager

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  issues: write

concurrency:
  group: lock

jobs:
  Add Label:
    runs-on: ubuntu-24.04
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - if: github.actor == 'dakanji'
        id: add-labels-declined
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          labels: 'Declined'

      - if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji'
        id: add-labels-withdrawn
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          labels: 'Withdrawn'
