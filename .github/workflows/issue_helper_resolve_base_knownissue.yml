name: 'Issue Helper Resolve KnownIssue'

on:
  workflow_dispatch:
    inputs:
      item_id:
        description: 'Item ID'
        required: true
      commit_ref:
        description: 'Commit Ref'
        required: true
      show_build_msg:
        type: choice
        description: 'Version Comment'
        options:
        - 'Yes'
        - 'No'
      more_info:
        description: 'More Info'
      show_more_info:
        type: choice
        description: 'Show More Info Entry'
        options:
        - 'No'
        - 'Yes'
      type_more_info:
        type: choice
        description: 'More Info Type'
        options:
        - 'Note'
        - 'Caution'

permissions:
  issues: write

concurrency:
  group: lock

jobs:

  issue_resolve_knownissue1:
    name: Issue - Resolve - KnownIssue1
    runs-on: ubuntu-24.04

    steps:
      - id: issue-get-state
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const isLocked = data.locked ? 'true' : 'false';
            const isClosed = data.state === 'closed' ? 'true' : 'false';
            fs.appendFileSync(process.env.GITHUB_ENV, `islocked=${isLocked}\n`);
            fs.appendFileSync(process.env.GITHUB_ENV, `isclosed=${isClosed}\n`);

  # Misc Issue Items - https://github.com/actions-cool/issues-helper
  issue_resolve_knownissue2:
    name: Issue - Resolve - KnownIssue2
    needs: [issue_resolve_knownissue1]
    runs-on: ubuntu-24.04

    if: ${{ success() || failure() }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - if: ${{ env.islocked == 'true' }}
        id: part_2_1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'unlock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

      - if: ${{ github.event.inputs.show_build_msg == 'Yes' }}
        id: part_2_2a
        uses: oprypin/find-latest-tag@v1
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          releases-only: true

      - if: ${{ github.event.inputs.show_build_msg == 'Yes' && github.event.inputs.show_more_info == 'Yes' && github.event.inputs.type_more_info == 'Note' }}
        id: part_2_2b
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |-
            This item was addressed by Commit ${{ github.event.inputs.commit_ref }} towards the next RefindPlus release.\
            The current release version is **${{ steps.part_2_2a.outputs.tag }}**.\
            See [BUILDING.md](https://github.com/RefindPlusRepo/RefindPlus/blob/GOPFix/BUILDING.md) for how to access functionality ahead of releases.

            > [!NOTE]
            > ${{ github.event.inputs.more_info }}

            Thank you for taking the time to report a problem with RefindPlus.

      - if: ${{ github.event.inputs.show_build_msg == 'Yes' && github.event.inputs.show_more_info == 'Yes' && github.event.inputs.type_more_info == 'Caution' }}
        id: part_2_2c
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            This item was addressed by Commit ${{ github.event.inputs.commit_ref }} towards the next RefindPlus release.\
            The current release version is **${{ steps.part_2_2a.outputs.tag }}**.\
            See [BUILDING.md](https://github.com/RefindPlusRepo/RefindPlus/blob/GOPFix/BUILDING.md) for how to access functionality ahead of releases.

            > [!CAUTION]
            > ${{ github.event.inputs.more_info }}

            Thank you for taking the time to report a problem with RefindPlus.

      - if: ${{ github.event.inputs.show_build_msg == 'Yes' && github.event.inputs.show_more_info == 'No' }}
        id: part_2_2d
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            This item was addressed by Commit ${{ github.event.inputs.commit_ref }} towards the next RefindPlus release.\
            The current release version is **${{ steps.part_2_2a.outputs.tag }}**.\
            See [BUILDING.md](https://github.com/RefindPlusRepo/RefindPlus/blob/GOPFix/BUILDING.md) for how to access functionality ahead of releases.

            Thank you for taking the time to report a problem with RefindPlus.

      - if: ${{ github.event.inputs.show_build_msg == 'No' && github.event.inputs.show_more_info == 'Yes' && github.event.inputs.type_more_info == 'Note' }}
        id: part_2_3a
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            This item was addressed by Commit ${{ github.event.inputs.commit_ref }} towards the next RefindPlus release.

            > [!NOTE]
            > ${{ github.event.inputs.more_info }}

            Thank you for taking the time to report a problem with RefindPlus.

      - if: ${{ github.event.inputs.show_build_msg == 'No' && github.event.inputs.show_more_info == 'Yes' && github.event.inputs.type_more_info == 'Caution' }}
        id: part_2_3b
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            This item was addressed by Commit ${{ github.event.inputs.commit_ref }} towards the next RefindPlus release.

            > [!CAUTION]
            > ${{ github.event.inputs.more_info }}

            Thank you for taking the time to report a problem with RefindPlus.

      - if: ${{ github.event.inputs.show_build_msg == 'No' && github.event.inputs.show_more_info == 'No' }}
        id: part_2_3c
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            This item was addressed by Commit ${{ github.event.inputs.commit_ref }} towards the next RefindPlus release.

            Thank you for taking the time to report a problem with RefindPlus.

  issue_resolve_knownissue3:
    name: Issue - Resolve - KnownIssue3
    needs: [issue_resolve_knownissue2]
    runs-on: ubuntu-24.04

    if: ${{ success() || failure() }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: part_3_1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Known-Issue,Resolved'

      - id: part_3_2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage,Queries,Parked,Prorogued,Unclear,Uncertain,Unresolved,Acknowledged,Bug'

  issue_resolve_knownissue4:
    name: Issue - Resolve - KnownIssue4
    needs: [issue_resolve_knownissue3]
    runs-on: ubuntu-24.04

    if: ${{ success() || failure() }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - if: ${{ env.isclosed == 'false' }}
        id: part_4_1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'completed'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

      - if: ${{ env.islocked == 'true' }}
        id: part_4_2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'lock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
